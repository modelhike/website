<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#0f0f10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.7">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand mark -->
  <g transform="translate(80, 80)">
    <path d="M0 36 L18 0 L24 12 L30 0 L48 36"
          fill="none" stroke="#4ade80" stroke-width="3"
          stroke-linejoin="round" stroke-linecap="round"/>
    <text x="62" y="28" font-family="ui-monospace, Menlo, monospace"
          font-size="22" fill="#fafafa" font-weight="600">ModelHike</text>
    <text x="62" y="50" font-family="ui-monospace, Menlo, monospace"
          font-size="14" fill="#71717a">/ intent compiler</text>
  </g>

  <!-- hero text -->
  <g transform="translate(80, 220)">
    <text font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
          font-size="72" font-weight="600" fill="#fafafa" letter-spacing="-3">
      <tspan x="0" y="0">AI is stealing your time.</tspan>
    </text>
    <text font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
          font-size="72" font-weight="600" fill="url(#title)" letter-spacing="-3">
      <tspan x="0" y="86">Diff the why, not the what.</tspan>
    </text>
    <text font-family="ui-monospace, Menlo, monospace"
          font-size="22" fill="#a1a1aa">
      <tspan x="0" y="170">$ npx modelhike demo</tspan>
    </text>
  </g>

  <!-- chip -->
  <g transform="translate(80, 470)">
    <rect width="320" height="42" rx="21" fill="#16161a" stroke="#1f1f23"/>
    <circle cx="22" cy="21" r="4" fill="#4ade80"/>
    <text x="38" y="27" font-family="ui-monospace, Menlo, monospace"
          font-size="14" fill="#a1a1aa">Intent-native, not prompt-guessed</text>
  </g>

  <!-- code panel preview -->
  <g transform="translate(720, 200)">
    <rect width="400" height="320" rx="14" fill="#111113" stroke="#1f1f23"/>
    <rect width="400" height="34" rx="14" fill="#16161a" stroke="#1f1f23"/>
    <rect y="20" width="400" height="14" fill="#16161a" stroke="#1f1f23"/>
    <circle cx="16" cy="17" r="5" fill="#ff5f57"/>
    <circle cx="32" cy="17" r="5" fill="#febc2e"/>
    <circle cx="48" cy="17" r="5" fill="#28c840"/>
    <text x="70" y="22" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#71717a">booking.modelhike</text>

    <g font-family="ui-monospace, Menlo, monospace" font-size="14">
      <text x="22" y="64"  fill="#c4b5fd">Booking</text>
      <text x="22" y="84"  fill="#71717a">==========</text>
      <text x="22" y="108" fill="#4ade80">**</text>
      <text x="56" y="108" fill="#fafafa">id      :</text>
      <text x="160" y="108" fill="#c4b5fd">ID</text>
      <text x="22" y="128" fill="#60a5fa">*</text>
      <text x="56" y="128" fill="#fafafa">user    :</text>
      <text x="160" y="128" fill="#c4b5fd">Reference@User</text>
      <text x="22" y="148" fill="#71717a">-</text>
      <text x="56" y="148" fill="#fafafa">status  :</text>
      <text x="160" y="148" fill="#c4b5fd">String</text>
      <text x="22" y="168" fill="#60a5fa">*</text>
      <text x="56" y="168" fill="#fafafa">total   :</text>
      <text x="160" y="168" fill="#c4b5fd">Decimal</text>

      <text x="22" y="208" fill="#4ade80">~ cancel</text>
      <text x="120" y="208" fill="#fafafa">(id:</text>
      <text x="160" y="208" fill="#c4b5fd">Int</text>
      <text x="190" y="208" fill="#fafafa">)</text>

      <text x="22" y="232" fill="#60a5fa">|></text>
      <text x="56" y="232" fill="#fbbf24">DB</text>
      <text x="86" y="232" fill="#fafafa">Booking</text>
      <text x="158" y="232" fill="#fbbf24">WHERE</text>
      <text x="22" y="252" fill="#60a5fa">|></text>
      <text x="56" y="252" fill="#fbbf24">UPDATE</text>
      <text x="135" y="252" fill="#fafafa">b.status</text>

      <text x="22" y="288" fill="#a1a1aa">@ apis</text>
      <text x="80" y="288" fill="#fafafa">::</text>
      <text x="105" y="288" fill="#fafafa">create, cancel, list</text>
    </g>
  </g>

  <!-- footer line -->
  <text x="80" y="590" font-family="ui-monospace, Menlo, monospace"
        font-size="14" fill="#52525b">modelhike.com · diff the why, not the what</text>
</svg>
