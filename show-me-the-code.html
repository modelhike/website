<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show me the code — ModelHike</title>
    <meta name="description" content="Browse real ModelHike playground input and generated Spring Boot output.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <style>
        :root {
            --ide-bg: #0d1117;
            --ide-surface: #161b22;
            --ide-border: #30363d;
            --ide-text: #e6edf3;
            --ide-muted: #8b949e;
            --ide-accent: #58a6ff;
            --font-sans: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --ide-sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background: var(--ide-bg);
            color: var(--ide-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .ide-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--ide-border);
            background: var(--ide-surface);
            flex-wrap: wrap;
        }

        .ide-topbar a {
            color: var(--ide-accent);
            text-decoration: none;
            font-weight: 500;
        }

        .ide-topbar a:hover {
            text-decoration: underline;
        }

        .ide-topbar h1 {
            font-size: 1rem;
            font-weight: 600;
        }

        .ide-topbar p {
            font-size: 0.85rem;
            color: var(--ide-muted);
            max-width: 42rem;
        }

        .ide-shell {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        #ide-sidebar {
            width: var(--ide-sidebar-width);
            min-width: 0;
            flex-shrink: 0;
            border-right: 1px solid var(--ide-border);
            background: var(--ide-surface);
            overflow-x: hidden;
            overflow-y: auto;
            padding: 0.75rem 0;
        }

        .ide-sidebar-resizer {
            flex-shrink: 0;
            width: 5px;
            cursor: col-resize;
            background: var(--ide-border);
            align-self: stretch;
            touch-action: none;
            position: relative;
            z-index: 2;
        }

        .ide-sidebar-resizer:hover,
        .ide-sidebar-resizer:focus-visible {
            background: var(--ide-accent);
            outline: none;
        }

        .ide-shell.is-resizing-sidebar .ide-sidebar-resizer {
            background: var(--ide-accent);
        }

        .ide-shell.is-resizing-sidebar {
            cursor: col-resize;
            user-select: none;
        }

        .ide-shell.is-resizing-sidebar * {
            cursor: col-resize !important;
        }

        .ide-group {
            margin-bottom: 1rem;
        }

        .ide-group-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--ide-muted);
            padding: 0.35rem 1rem;
        }

        .ide-file-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.45rem 1rem;
            border: none;
            background: transparent;
            color: var(--ide-text);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .ide-file-btn:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .ide-file-btn-active {
            background: rgba(88, 166, 255, 0.12);
            border-left-color: var(--ide-accent);
            color: var(--ide-accent);
        }

        .ide-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .ide-meta {
            padding: 0.65rem 1.25rem;
            border-bottom: 1px solid var(--ide-border);
            background: var(--ide-bg);
        }

        #ide-file-title {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
        }

        #ide-file-desc {
            font-size: 0.8rem;
            color: var(--ide-muted);
            margin-top: 0.25rem;
        }

        #ide-error {
            margin: 0.75rem 1.25rem;
            padding: 0.75rem 1rem;
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.4);
            border-radius: 6px;
            font-size: 0.85rem;
            color: #f85149;
        }

        #ide-error[hidden] {
            display: none;
        }

        .ide-editor-wrap {
            flex: 1;
            overflow: auto;
            padding: 1rem 1.25rem 2rem;
        }

        .ide-file-pre {
            margin: 0;
            padding: 1rem 1.1rem;
            border-radius: 8px;
            border: 1px solid var(--ide-border);
            overflow: auto;
            tab-size: 4;
        }

        /* Let Prism theme own background + token colors on code */
        .ide-file-pre code[class*='language-'] {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            line-height: 1.55;
            white-space: pre;
        }

        .ide-tree-root {
            padding: 0 0.25rem 0.5rem 0.25rem;
        }

        .ide-tree-details {
            margin: 0;
        }

        .ide-tree-folder {
            cursor: pointer;
            user-select: none;
            padding: 0.2rem 0.5rem 0.2rem 0.5rem;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--ide-muted);
            list-style: none;
        }

        .ide-tree-details > summary.ide-tree-folder::-webkit-details-marker {
            display: none;
        }

        .ide-tree-details > summary.ide-tree-folder::before {
            content: '';
            display: inline-block;
            width: 0;
            height: 0;
            margin-right: 0.4rem;
            border-style: solid;
            border-width: 0.28em 0 0.28em 0.42em;
            border-color: transparent transparent transparent var(--ide-muted);
            vertical-align: middle;
        }

        .ide-tree-details[open] > summary.ide-tree-folder::before {
            border-width: 0.42em 0.28em 0 0.28em;
            border-color: var(--ide-muted) transparent transparent transparent;
        }

        .ide-tree-inner {
            margin-left: 0.35rem;
            padding-left: 0.65rem;
            border-left: 1px solid var(--ide-border);
        }

        .ide-tree-leaf {
            padding-left: 0.5rem;
        }

        @media (max-width: 800px) {
            .ide-shell {
                flex-direction: column;
            }

            .ide-sidebar-resizer {
                display: none;
            }

            #ide-sidebar {
                width: 100% !important;
                border-right: none;
                border-bottom: 1px solid var(--ide-border);
                max-height: 40vh;
            }
        }
    </style>
</head>

<body>
    <header class="ide-topbar">
        <div>
            <h1 id="ide-page-title">Loading…</h1>
            <p id="ide-page-subtitle"></p>
        </div>
        <a href="index.html">← Back to homepage</a>
    </header>

    <div id="ide-error" hidden></div>

    <div class="ide-shell">
        <aside id="ide-sidebar" aria-label="File explorer"></aside>
        <div id="ide-sidebar-resizer" class="ide-sidebar-resizer" role="separator" aria-orientation="vertical"
            aria-label="Resize file explorer" aria-controls="ide-sidebar" tabindex="0"></div>
        <div class="ide-main">
            <div class="ide-meta">
                <div id="ide-file-title"></div>
                <div id="ide-file-desc"></div>
            </div>
            <div class="ide-editor-wrap">
                <pre class="ide-file-pre"><code id="ide-file-code"></code></pre>
            </div>
        </div>
    </div>

    <!-- Prism: explicit grammars (sync). Autoloader is async and often breaks when scripts are CDN-hosted. -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-clike.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-groovy.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-http.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-properties.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-ini.min.js"></script>
    <script src="demo/code-viewer.js"></script>
    <script>
        (function () {
            var STORAGE_KEY = 'modelhike-ide-sidebar-width';
            var MIN = 180;
            var MAX = 560;
            var shell = document.querySelector('.ide-shell');
            var aside = document.getElementById('ide-sidebar');
            var handle = document.getElementById('ide-sidebar-resizer');
            var root = document.documentElement;

            function isNarrowLayout() {
                return window.matchMedia('(max-width: 800px)').matches;
            }

            function setSidebarWidth(px) {
                px = Math.round(Math.max(MIN, Math.min(MAX, px)));
                root.style.setProperty('--ide-sidebar-width', px + 'px');
                try {
                    localStorage.setItem(STORAGE_KEY, String(px));
                } catch (e) {}
            }

            function readSavedWidth() {
                try {
                    var raw = localStorage.getItem(STORAGE_KEY);
                    if (raw == null) return null;
                    var n = parseInt(raw, 10);
                    if (isNaN(n)) return null;
                    return Math.max(MIN, Math.min(MAX, n));
                } catch (e) {
                    return null;
                }
            }

            var saved = readSavedWidth();
            if (saved != null && !isNarrowLayout()) setSidebarWidth(saved);

            if (!handle || !aside || !shell) return;

            function startDrag(e) {
                if (isNarrowLayout()) return;
                if (e.button !== undefined && e.button !== 0) return;
                if (typeof e.preventDefault === 'function') e.preventDefault();
                var startX = e.clientX;
                var startW = aside.getBoundingClientRect().width;

                function move(ev) {
                    setSidebarWidth(startW + (ev.clientX - startX));
                }

                function up() {
                    shell.classList.remove('is-resizing-sidebar');
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseup', up);
                    document.removeEventListener('touchmove', moveTouch);
                    document.removeEventListener('touchend', up);
                }

                function moveTouch(ev) {
                    ev.preventDefault();
                    if (ev.touches.length) move(ev.touches[0]);
                }

                shell.classList.add('is-resizing-sidebar');
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', up);
                document.addEventListener('touchmove', moveTouch, { passive: false });
                document.addEventListener('touchend', up);
            }

            handle.addEventListener('mousedown', startDrag);
            handle.addEventListener('touchstart', function (e) {
                if (!e.touches.length) return;
                e.preventDefault();
                startDrag(e.touches[0]);
            }, { passive: false });

            handle.addEventListener('keydown', function (e) {
                if (isNarrowLayout()) return;
                var step = e.shiftKey ? 32 : 12;
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    setSidebarWidth(aside.getBoundingClientRect().width - step);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    setSidebarWidth(aside.getBoundingClientRect().width + step);
                }
            });

            window.addEventListener('resize', function () {
                if (isNarrowLayout()) return;
                var w = aside.getBoundingClientRect().width;
                if (w < MIN) setSidebarWidth(MIN);
                else if (w > MAX) setSidebarWidth(MAX);
            });
        })();

        ModelHikeDemo.initIdePage({ manifestUrl: 'demo-data/airport/manifest.json' });
    </script>
</body>

</html>
